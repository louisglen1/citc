<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITC Demo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1a202c;
            --text-muted: #718096;
            --accent: #3b82f6;
            --radius: 6px;
            --focus-color: rgba(59,130,246,0.12);

            --c-focus:     #3b82f6;
            --c-blur:      #94a3b8;
            --c-keystroke: #22c55e;
            --c-deletion:  #ef4444;
            --c-caret:     #a855f7;
            --c-selection: #f97316;
            --c-clipboard: #0ea5e9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: grid;
            grid-template-rows: 52px 1fr;
            overflow: hidden;
        }

        /* Header */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
        }
        header h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        header p {
            font-size: 13px;
            color: var(--text-muted);
        }
        .status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #94a3b8;
            transition: background 0.2s;
        }
        .status-dot.running { background: #22c55e; }

        /* Layout */
        main {
            display: grid;
            grid-template-columns: 280px 1fr;
            overflow: hidden;
        }

        /* Left panel */
        .panel-left {
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* Fields */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .field-group input {
            width: 100%;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus-color);
        }

        /* Config */
        .config-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .checkbox-row input[type=checkbox] {
            width: 14px;
            height: 14px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .checkbox-row span {
            font-size: 13px;
        }
        .checkbox-row .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .divider {
            height: 1px;
            background: var(--border);
        }

        /* Right panel */
        .panel-right {
            display: grid;
            grid-template-rows: 44px 1fr 36px;
            overflow: hidden;
            background: var(--bg);
        }
        .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .log-header span {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .log-header button {
            font-size: 12px;
            color: var(--text-muted);
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 3px 10px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .log-header button:hover { color: var(--text); border-color: #94a3b8; }

        #event-log {
            overflow-y: auto;
            padding: 8px 0;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 12.5px;
        }

        .log-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-family: -apple-system, sans-serif;
            font-size: 13px;
        }

        .log-entry {
            display: grid;
            grid-template-columns: 88px 88px 90px 1fr;
            gap: 0;
            padding: 4px 16px;
            align-items: center;
            border-bottom: 1px solid transparent;
            transition: background 0.1s;
        }
        .log-entry:hover { background: #f1f5f9; }

        .log-time { color: var(--text-muted); font-size: 11px; }
        .log-badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            width: fit-content;
        }
        .log-field { color: var(--text-muted); padding-left: 8px; }
        .log-data { color: var(--text); padding-left: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Stats bar */
        .stats-bar {
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 16px;
            overflow-x: auto;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            white-space: nowrap;
        }
        .stat .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .stat .count { font-weight: 600; color: var(--text); }
        .stat .label { color: var(--text-muted); }
        .stat-total {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header>
        <h1>CITC</h1>
        <p>Client Input Telemetry Collection</p>
        <div class="status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Stopped</span>
        </div>
    </header>

    <main>
        <div class="panel-left">

            <div>
                <div class="section-label">Fields</div>
                <div class="field-group">
                    <div>
                        <label>Username</label>
                        <input type="text" data-citc="username" placeholder="Type here..." autocomplete="off" />
                    </div>
                    <div>
                        <label>Email</label>
                        <input type="text" data-citc="email" placeholder="Type here..." autocomplete="off" />
                    </div>
                    <div>
                        <label>Message</label>
                        <input type="text" data-citc="message" placeholder="Type here..." autocomplete="off" />
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <div>
                <div class="section-label">Capture</div>
                <div class="config-group">
                    <label class="checkbox-row">
                        <input type="checkbox" id="cap-focus" checked />
                        <span class="dot" style="background:var(--c-focus)"></span>
                        <span>focus / blur</span>
                    </label>
                    <label class="checkbox-row">
                        <input type="checkbox" id="cap-keystroke" checked />
                        <span class="dot" style="background:var(--c-keystroke)"></span>
                        <span>keystroke</span>
                    </label>
                    <label class="checkbox-row">
                        <input type="checkbox" id="cap-caret" />
                        <span class="dot" style="background:var(--c-caret)"></span>
                        <span>caret</span>
                    </label>
                    <label class="checkbox-row">
                        <input type="checkbox" id="cap-selection" checked />
                        <span class="dot" style="background:var(--c-selection)"></span>
                        <span>selection</span>
                    </label>
                    <label class="checkbox-row">
                        <input type="checkbox" id="cap-clipboard" checked />
                        <span class="dot" style="background:var(--c-clipboard)"></span>
                        <span>clipboard</span>
                    </label>
                </div>
            </div>

            <div class="divider"></div>

            <div>
                <div class="section-label">Privacy</div>
                <div class="config-group">
                    <label class="checkbox-row">
                        <input type="checkbox" id="priv-text" checked />
                        <span>Redact keystroke text</span>
                    </label>
                    <label class="checkbox-row">
                        <input type="checkbox" id="priv-clipboard" checked />
                        <span>Redact clipboard content</span>
                    </label>
                </div>
            </div>

        </div>

        <div class="panel-right">
            <div class="log-header">
                <span>Event Stream</span>
                <button id="clear-btn">Clear</button>
            </div>
            <div id="event-log">
                <div class="log-empty" id="empty-msg">Interact with the fields to see events</div>
            </div>
            <div class="stats-bar" id="stats-bar">
                <div class="stat"><span class="dot" style="background:var(--c-focus)"></span><span class="count" id="cnt-focus">0</span><span class="label">focus</span></div>
                <div class="stat"><span class="dot" style="background:var(--c-keystroke)"></span><span class="count" id="cnt-keystroke">0</span><span class="label">keystroke</span></div>
                <div class="stat"><span class="dot" style="background:var(--c-deletion)"></span><span class="count" id="cnt-deletion">0</span><span class="label">deletion</span></div>
                <div class="stat"><span class="dot" style="background:var(--c-caret)"></span><span class="count" id="cnt-caret">0</span><span class="label">caret</span></div>
                <div class="stat"><span class="dot" style="background:var(--c-selection)"></span><span class="count" id="cnt-selection">0</span><span class="label">selection</span></div>
                <div class="stat"><span class="dot" style="background:var(--c-clipboard)"></span><span class="count" id="cnt-clipboard">0</span><span class="label">clipboard</span></div>
                <span class="stat-total" id="total-count">0 total</span>
            </div>
        </div>
    </main>

    <script type="module" src="./demo.js"></script>
</body>
</html>
